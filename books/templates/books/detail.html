{% extends 'base.html' %}
{% block content %}
<div class="row">
  <div class="col-md-5">
    {% if book.cover_image %}
    <img src="{{ book.cover_image }}" class="img-fluid rounded" alt="{{ book.title }}" />
    {% endif %}
  </div>
  <div class="col-md-7">
    <h2>{{ book.title }}</h2>
    <p class="text-muted">by {{ book.author }}</p>
    <p class="fw-bold h4">${{ book.price }}</p>
    <p class="mt-3">{{ book.description }}</p>
    <button class="btn btn-success btn-lg mt-3">Add to cart</button>
  </div>
</div>
{% endblock %}
